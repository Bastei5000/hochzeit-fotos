<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hochzeitsfotos Upload</title>

  <style>

    body{
      margin:0;
      height:100vh;

      /* Hintergrundbild */
      background-image: url('hintergrund.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      /* Inhalt zentrieren */
      display:flex;
      justify-content:center;
      align-items:center;

      font-family: Arial, sans-serif;
    }

    /* Dunkler Overlay-Effekt */
    body::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.4);
      z-index:0;
    }

    .box{
      position:relative;
      z-index:1;

      background: rgba(255,255,255,0.95);
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);

      width:350px;
      max-width:90%;

      text-align:center;
    }

    h1{
      margin-top:0;
      color:#e11d48;
    }

    p{
      color:#444;
    }

    input{
      margin-top:15px;
      width:100%;
    }

    button{
      background:#e11d48;
      color:white;
      border:none;

      padding:15px 25px;
      border-radius:12px;

      cursor:pointer;
      font-size:16px;

      margin-top:20px;
      width:100%;
    }

    button:hover{
      opacity:0.9;
    }

    #status{
      margin-top:20px;
      font-size:14px;
      color:#333;
    }

    @media (max-width:500px){

      .box{
        padding:25px;
      }

      h1{
        font-size:24px;
      }

    }

  </style>
</head>

<body>

  <div class="box">

    <h1>💍 Hochzeitsfotos</h1>

    <p>Teile deine schönsten Momente mit uns ❤️</p>

    <input
      type="file"
      id="photos"
      multiple
      accept="image/*"
    >

    <button onclick="uploadPhotos()">
      Fotos hochladen
    </button>

    <p id="status"></p>

  </div>

<script>

const UPLOAD_URL =
"https://script.google.com/macros/s/AKfycbyqi8NznWgb7L-x6RzJS2RFrXKHRwlxbwppKgURSF3qNq0qQ7Jc_rCT_Q0wtAbs4e9k/exec";

async function uploadPhotos() {

  const files =
    document.getElementById('photos').files;

  if(files.length === 0){

    alert("Bitte Fotos auswählen");

    return;
  }

  let uploaded = 0;

  document.getElementById("status").innerText =
    "Upload läuft...";

  for (const file of files) {

    const base64Data =
      await toBase64(file);

    const formData =
      new URLSearchParams();

    formData.append(
      "data",
      base64Data.split(',')[1]
    );

    formData.append(
      "name",
      file.name
    );

    formData.append(
      "type",
      file.type
    );

    try {

      const response = await fetch(
        UPLOAD_URL,
        {
          method: "POST",
          body: formData
        }
      );

      const text =
        await response.text();

      if(text === "OK"){

        uploaded++;

        document.getElementById("status").innerText =
          `${uploaded}/${files.length} Fotos hochgeladen ❤️`;

      }

    } catch(error){

      console.log(error);

    }

  }

  document.getElementById("status").innerText =
    `Alle ${uploaded} Fotos erfolgreich hochgeladen 🎉`;

}

function toBase64(file){

  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload =
      () => resolve(reader.result);

    reader.onerror =
      error => reject(error);

  });

}

</script>

</body>
</html>
